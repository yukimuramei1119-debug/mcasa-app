<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>說故事時間 MCASA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

:root {
  --cream:#FFF8EE; --warm-orange:#FF8C42; --soft-yellow:#FFD166;
  --sky-blue:#74C0FC; --soft-green:#95D5B2; --choco:#7B3F00;
  --pink:#FFB3C6; --purple:#9B59B6;
  --text-dark:#3D2B1F; --text-mid:#6B4F3A;
  --card-bg:#FFFDF7; --shadow:rgba(61,43,31,.13);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;overflow-x:hidden;}
body.lang-sc{font-family:'Nunito','Noto Sans SC',sans-serif;}

.screen{display:none;min-height:100vh;width:100%;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .45s ease;padding:16px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes bounceS{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,.4)}50%{box-shadow:0 0 0 18px rgba(255,80,80,0)}}
@keyframes starBurst{0%{transform:scale(0) rotate(0);opacity:0}60%{transform:scale(1.2) rotate(200deg);opacity:1}100%{transform:scale(1) rotate(360deg);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LANG */
#screen-lang{background:linear-gradient(150deg,#FFF3D6,#FFE0EE,#E8F4FD);position:relative;overflow:hidden;}
.lang-box{text-align:center;z-index:1;}
.lang-chars{display:flex;justify-content:center;gap:26px;margin-bottom:16px;}
.lang-char{animation:floatY 3s ease-in-out infinite;}
.lang-char:nth-child(2){animation-delay:1.2s;}
.lang-title{font-size:26px;font-weight:900;}
.lang-sub{font-size:15px;color:var(--text-mid);margin:10px 0 30px;}
.lang-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.lang-btn{padding:18px 42px;border-radius:50px;border:3px solid var(--choco);background:white;font-size:20px;font-weight:700;color:var(--choco);cursor:pointer;transition:all .2s;box-shadow:0 4px 0 var(--choco);font-family:inherit;}
.lang-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--choco);}

/* INTRO */
#screen-intro{background:linear-gradient(150deg,#E8F7FD 0%,#FFF3D6 55%,#FFE0EE 100%);}
.intro-stage{width:100%;max-width:640px;}
.speech-bubble{background:white;border-radius:22px;padding:16px 20px;margin-bottom:14px;box-shadow:0 5px 20px var(--shadow);border:2.5px solid var(--choco);text-align:center;position:relative;animation:popIn .35s ease;min-height:96px;display:flex;flex-direction:column;justify-content:center;}
.speech-bubble::after{content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--choco);}
.speech-bubble::before{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:white;z-index:1;}
.bubble-who{font-size:12px;font-weight:900;letter-spacing:1.5px;color:var(--choco);margin-bottom:5px;}
.bubble-text{font-size:17px;font-weight:700;line-height:1.6;}
.scene-box{background:linear-gradient(180deg,#B8E8FF 0%,#D6F4FF 42%,#B8EAC8 42%,#90D8A8 100%);border-radius:26px;padding:14px 18px 8px;position:relative;overflow:hidden;box-shadow:0 6px 24px var(--shadow);margin-bottom:14px;}
.scene-clouds{display:flex;justify-content:space-around;margin-bottom:6px;}
.cloud{background:rgba(255,255,255,.85);border-radius:50px;padding:4px 15px;font-size:18px;animation:floatY 4s ease-in-out infinite;}
.cloud:nth-child(2){animation-delay:1.5s;}
.cloud:nth-child(3){animation-delay:3s;}
.characters{display:flex;justify-content:space-around;align-items:flex-end;}
.char-wrap{text-align:center;}
.char-wrap.princess{animation:floatY 3.2s ease-in-out infinite;}
.char-wrap.wolf{animation:floatY 3.2s ease-in-out infinite 1.1s;}
.char-name{font-size:12px;font-weight:900;color:var(--text-mid);margin-top:4px;}
.step-dots{display:flex;justify-content:center;gap:8px;margin:12px 0;}
.step-dot{width:9px;height:9px;border-radius:50%;background:#DDD;transition:all .3s;}
.step-dot.active{background:var(--warm-orange);transform:scale(1.35);}
.step-dot.done{background:var(--soft-green);}

.btn-main{display:block;width:100%;padding:17px;background:var(--warm-orange);color:white;border:none;border-radius:50px;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #c96e2a;transition:all .2s;font-family:inherit;}
.btn-main:active{transform:translateY(2px);box-shadow:0 2px 0 #c96e2a;}
.btn-main:disabled{opacity:.5;}

/* INFO */
#screen-info{background:linear-gradient(150deg,#FFF3D6,#FFE4EE);}
.info-card{background:var(--card-bg);border-radius:28px;padding:30px 26px;max-width:440px;width:100%;box-shadow:0 8px 28px var(--shadow);}
.info-header{text-align:center;margin-bottom:24px;}
.info-icon{font-size:46px;display:block;margin-bottom:8px;animation:wiggle 2.5s ease-in-out infinite;}
.info-title{font-size:21px;font-weight:900;color:var(--choco);}
.info-sub{font-size:14px;color:var(--text-mid);margin-top:4px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:14px;font-weight:700;color:var(--text-mid);margin-bottom:6px;}
.form-input{width:100%;padding:14px 16px;border:2.5px solid #E8D5BE;border-radius:14px;font-size:16px;font-family:inherit;background:#FFFDF7;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--warm-orange);}
.checkbox-group{display:flex;flex-direction:column;gap:9px;}
.checkbox-item{display:flex;align-items:center;gap:11px;padding:13px 15px;border:2.5px solid #E8D5BE;border-radius:14px;cursor:pointer;transition:all .2s;background:#FFFDF7;}
.checkbox-item input{width:20px;height:20px;accent-color:var(--warm-orange);}
.checkbox-emoji{font-size:20px;}
.checkbox-label{font-size:15px;font-weight:700;}

/* MIC TEST */
#screen-mictest{background:linear-gradient(150deg,#E8F5FD,#FFF3D6);}
.mic-card{background:var(--card-bg);border-radius:28px;padding:32px 26px;max-width:440px;width:100%;box-shadow:0 8px 28px var(--shadow);text-align:center;}
.mic-icon{font-size:56px;display:block;margin-bottom:12px;animation:bounceS 1.5s ease infinite;}
.mic-title{font-size:22px;font-weight:900;color:var(--choco);margin-bottom:10px;}
.mic-text{font-size:15px;color:var(--text-mid);line-height:1.8;margin-bottom:20px;}
.mic-meter-wrap{background:#F0E8D8;border-radius:50px;height:20px;overflow:hidden;margin-bottom:20px;}
.mic-meter{height:100%;width:0%;background:linear-gradient(90deg,var(--soft-green),var(--soft-yellow),var(--warm-orange));border-radius:50px;transition:width .1s;}
.mic-status{font-size:15px;font-weight:900;margin-bottom:18px;min-height:24px;}
.mic-status.ok{color:#1A9C56;}
.mic-status.bad{color:#E53E3E;}

/* PRACTICE */
#screen-practice{background:linear-gradient(150deg,#E8F5FD,#FFF3D6);}
.practice-card{background:var(--card-bg);border-radius:28px;padding:28px 26px;max-width:520px;width:100%;box-shadow:0 8px 28px var(--shadow);}
.practice-icon{font-size:46px;display:block;text-align:center;margin-bottom:10px;animation:floatY 3s ease-in-out infinite;}
.practice-title{font-size:20px;font-weight:900;color:var(--choco);text-align:center;margin-bottom:12px;}
.practice-text{font-size:15px;color:var(--text-mid);line-height:1.9;margin-bottom:14px;background:#FFF8EE;border-radius:14px;padding:14px 16px;}
.practice-tip{background:linear-gradient(135deg,#E8F7E8,#D4F0D4);border-radius:14px;padding:12px 15px;font-size:14px;color:#1A5C36;font-weight:700;margin-bottom:16px;display:flex;gap:8px;}

/* RECORD */
#screen-record{background:linear-gradient(150deg,#FFF3D6,#FFE4EE);}
.record-wrap{max-width:560px;width:100%;}
.progress-wrap{background:rgba(123,63,0,.13);border-radius:50px;height:9px;margin-bottom:14px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--warm-orange),var(--soft-yellow));border-radius:50px;transition:width .5s ease;}
.story-header{text-align:center;margin-bottom:12px;}
.story-badge{display:inline-block;background:var(--warm-orange);color:white;font-size:12px;font-weight:900;padding:5px 16px;border-radius:50px;margin-bottom:6px;letter-spacing:1px;}
.story-title{font-size:23px;font-weight:900;color:var(--choco);}
.story-hint{font-size:13px;color:var(--text-mid);margin-top:3px;}
.word-card{background:var(--card-bg);border-radius:20px;padding:16px;box-shadow:0 5px 20px var(--shadow);margin-bottom:12px;}
.word-card-title{font-size:11px;font-weight:900;color:var(--warm-orange);letter-spacing:2px;margin-bottom:10px;text-align:center;}
.word-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.word-chip{background:linear-gradient(135deg,#FFF8EE,#FFE8C8);border:2px solid rgba(123,63,0,.2);border-radius:10px;padding:8px 4px;text-align:center;font-size:13px;font-weight:700;line-height:1.3;}
.word-chip.empty{opacity:0;}
.timer-row{display:flex;justify-content:center;margin-bottom:8px;}
.timer-display{font-size:36px;font-weight:900;color:var(--choco);letter-spacing:2px;}
.timer-display.warning{color:#E53E3E;animation:bounceS .5s ease infinite;}
.record-area{text-align:center;margin-bottom:10px;}
.btn-record{width:88px;height:88px;border-radius:50%;border:4px solid #E53E3E;background:white;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:36px;transition:all .2s;box-shadow:0 4px 18px rgba(229,62,62,.25);}
.btn-record.recording{background:#E53E3E;animation:recPulse 1.5s ease infinite;}
.rec-icon::after{content:'🎙️';}
.btn-record.recording .rec-icon::after{content:'⏹';}
.record-hint{font-size:13px;color:var(--text-mid);margin-top:6px;font-weight:700;}
.rec-label{display:none;background:#E53E3E;color:white;font-size:12px;font-weight:900;padding:3px 14px;border-radius:50px;margin:4px auto;width:fit-content;}
.rec-label.on{display:block;animation:bounceS 1s ease infinite;}
.transcript-label{font-size:11px;font-weight:900;color:var(--text-mid);letter-spacing:1px;margin-bottom:4px;}
.transcript-box{background:white;border:2px dashed #E8D5BE;border-radius:12px;padding:10px 14px;min-height:52px;font-size:13px;color:var(--text-mid);line-height:1.6;margin-bottom:12px;max-height:90px;overflow-y:auto;}
.action-row{display:flex;gap:10px;}
.btn-skip{flex:1;padding:14px;background:white;border:2.5px solid #E8D5BE;border-radius:50px;font-size:15px;font-weight:700;color:var(--text-mid);cursor:pointer;font-family:inherit;}
.btn-submit{flex:2;padding:14px;background:var(--soft-green);border:none;border-radius:50px;font-size:15px;font-weight:900;color:#1A5C36;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 #5aaa7a;}
.btn-submit:disabled{opacity:.5;box-shadow:none;}

/* UPLOAD OVERLAY */
.upload-overlay{position:fixed;inset:0;background:rgba(61,43,31,.55);display:none;align-items:center;justify-content:center;z-index:100;}
.upload-overlay.on{display:flex;}
.upload-box{background:white;border-radius:24px;padding:32px 36px;text-align:center;max-width:320px;}
.spinner{width:44px;height:44px;border:5px solid #F0E8D8;border-top-color:var(--warm-orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
.upload-msg{font-size:16px;font-weight:900;color:var(--choco);}
.upload-sub{font-size:13px;color:var(--text-mid);margin-top:6px;}

/* FEEDBACK */
#screen-feedback{background:linear-gradient(150deg,#E8F7E8,#FFF3D6);}
.feedback-card{background:var(--card-bg);border-radius:28px;padding:30px 26px;max-width:440px;width:100%;box-shadow:0 8px 28px var(--shadow);text-align:center;}
.feedback-chars{display:flex;justify-content:center;gap:18px;margin-bottom:12px;}
.feedback-char{animation:bounceS 1.4s ease infinite;}
.feedback-char:nth-child(2){animation-delay:.4s;}
.feedback-title{font-size:20px;font-weight:900;color:var(--choco);margin-bottom:10px;}
.feedback-text{font-size:17px;color:var(--text-mid);line-height:1.8;margin-bottom:20px;background:#F0FBF0;border-radius:14px;padding:16px 18px;border-left:4px solid var(--soft-green);}

/* COMPLETE */
#screen-complete{background:linear-gradient(150deg,#FFF3D6,#FFE4EE,#E8F7E8);text-align:center;position:relative;overflow:hidden;}
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall linear infinite;}
.complete-content{position:relative;z-index:1;max-width:440px;}
.complete-chars{display:flex;justify-content:center;gap:14px;margin-bottom:6px;}
.complete-char{animation:bounceS 1.5s ease infinite;}
.complete-char:nth-child(2){animation-delay:.5s;}
.complete-stars{font-size:48px;display:block;animation:starBurst .8s ease;margin-bottom:4px;letter-spacing:4px;}
.complete-title{font-size:30px;font-weight:900;color:var(--choco);margin-bottom:8px;}
.complete-sub{font-size:16px;color:var(--text-mid);line-height:1.7;margin-bottom:22px;}
.complete-summary{background:white;border-radius:18px;padding:16px 20px;box-shadow:0 4px 18px var(--shadow);margin-bottom:20px;text-align:left;}
.summary-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #F0E8D8;font-size:14px;}
.summary-row:last-child{border-bottom:none;}
.upload-status-chip{display:inline-block;padding:2px 10px;border-radius:50px;font-size:11px;font-weight:900;}
.upload-status-chip.ok{background:#D4F0D4;color:#1A5C36;}
.upload-status-chip.fail{background:#FFD6D6;color:#C53030;}
.btn-dl{display:block;width:100%;padding:14px;background:white;color:var(--choco);border:2.5px solid var(--choco);border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;}

@media(max-width:420px){
  .word-grid{grid-template-columns:repeat(4,1fr);}
  .word-chip{font-size:11.5px;padding:7px 2px;}
  .story-title{font-size:20px;}
}
</style>
</head>

async function runMicTest(){
  const statusEl=document.getElementById('mic-status');
  const meterEl=document.getElementById('mic-meter');
  try{
    micTestStream=await navigator.mediaDevices.getUserMedia({audio:true});
    statusEl.textContent=t('micTesting');
    statusEl.className='mic-status';
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const src=ctx.createMediaStreamSource(micTestStream);
    const analyser=ctx.createAnalyser();
    analyser.fftSize=512;
    src.connect(analyser);
    const data=new Uint8Array(analyser.frequencyBinCount);
    let heard=false, count=0;
    const iv=setInterval(()=>{
      analyser.getByteFrequencyData(data);
      const vol=data.reduce((a,b)=>a+b,0)/data.length;
      meterEl.style.width=Math.min(vol*2.2,100)+'%';
      if(vol>18){
        heard=true;
        statusEl.textContent=t('micGood');
        statusEl.className='mic-status ok';
        document.getElementById('btn-mic-ok').style.display='block';
      }
      count++;
      if(count>150){ // 15s timeout
        clearInterval(iv);
        if(!heard){statusEl.textContent=t('micBad');statusEl.className='mic-status bad';}
        micTestStream.getTracks().forEach(tr=>tr.stop());
        ctx.close();
      }
      if(heard&&count>30){ // keep meter alive 3s after success
        clearInterval(iv);
        micTestStream.getTracks().forEach(tr=>tr.stop());
        ctx.close();
      }
    },100);
  }catch(e){
    statusEl.textContent=t('micBad');
    statusEl.className='mic-status bad';
    alert(currentLang==='tc'
      ?'無法開啟麥克風！\n請允許麥克風權限：\n手機：畫面彈出詢問時按「允許」\n電腦Chrome：點網址列左邊圖示→網站設定→麥克風→允許'
      :'无法开启麦克风！\n请允许麦克风权限。');
  }
}

// ===== START =====
function startApp(){
  appStarted=true;
  storyQueue=['practice'];
  if(studentData.hasDad){storyQueue.push('F1','F2');}
  if(studentData.hasMom){storyQueue.push('M1','M2');}
  currentStoryIndex=0;
  document.getElementById('practice-title').textContent=t('practiceTitle');
  document.getElementById('practice-text').innerHTML=t('practiceText');
  document.getElementById('practice-tip-text').textContent=t('practiceTip');
  document.getElementById('practice-go-label').textContent=t('practiceGoLabel');
  showScreen('screen-practice');
}

// ===== RECORD =====
function goToRecord(storyId){
  currentStoryId=storyId;
  currentTranscript='';
  const story=STORIES[storyId];
  document.getElementById('story-badge').textContent=story.badge[currentLang];
  document.getElementById('story-title').textContent=story.title[currentLang];
  document.getElementById('story-hint').textContent=t('storyHint');
  document.getElementById('word-card-title').textContent=t('wordCardTitle');
  document.getElementById('record-hint').textContent=t('recordHint');
  document.getElementById('rec-label').textContent=t('recLabel');
  document.getElementById('transcript-label').textContent=t('transcriptLabel');
  document.getElementById('btn-skip').textContent=t('skipLabel');
  document.getElementById('submit-label').textContent=t('submitLabel');
  document.getElementById('transcript-box').textContent='';
  const idx=storyQueue.indexOf(storyId);
  document.getElementById('progress-bar').style.width=(storyQueue.length>1?(idx/(storyQueue.length-1))*100:0)+'%';
  renderWordGrid(story.words);
  isRecording=false;
  document.getElementById('btn-record').classList.remove('recording');
  document.getElementById('rec-label').classList.remove('on');
  document.getElementById('btn-submit').disabled=true;
  resetTimer();
  showScreen('screen-record');
}

function renderWordGrid(words){
  const grid=document.getElementById('word-grid');
  grid.innerHTML='';
  words.forEach(row=>row.forEach(word=>{
    const chip=document.createElement('div');
    chip.className='word-chip'+(word?'':' empty');
    chip.textContent=word;
    grid.appendChild(chip);
  }));
}

// ===== RECORDING =====
async function toggleRecording(){
  if(!isRecording)await startRecording();
  else stopRecording();
}

async function startRecording(){
  try{
    activeStream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    const mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':
               MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
    mediaRecorder=mime?new MediaRecorder(activeStream,{mimeType:mime}):new MediaRecorder(activeStream);
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.start(250);
    isRecording=true;
    document.getElementById('btn-record').classList.add('recording');
    document.getElementById('rec-label').classList.add('on');
    document.getElementById('record-hint').textContent=t('recordHintActive');
    startTimer();
    startSR();
  }catch(e){
    alert(currentLang==='tc'?'無法開啟麥克風！請允許麥克風權限。':'无法开启麦克风！请允许麦克风权限。');
  }
}

function stopRecording(){
  return new Promise(resolve=>{
    if(!mediaRecorder){resolve();return;}
    mediaRecorder.onstop=()=>{
      const mime=mediaRecorder.mimeType||'audio/webm';
      const blob=new Blob(audioChunks,{type:mime});
      recordings[currentStoryId]={blob,transcript:currentTranscript,mime,durationSec:timerSeconds};
      if(activeStream){activeStream.getTracks().forEach(tr=>tr.stop());activeStream=null;}
      resolve();
    };
    mediaRecorder.stop();
    isRecording=false;
    document.getElementById('btn-record').classList.remove('recording');
    document.getElementById('rec-label').classList.remove('on');
    document.getElementById('record-hint').textContent=t('recordHint');
    stopTimer();
    stopSR();
    document.getElementById('btn-submit').disabled=false;
  });
}

// ===== TIMER =====
function startTimer(){timerSeconds=0;timerInterval=setInterval(()=>{timerSeconds++;updateTimer();},1000);}
function stopTimer(){clearInterval(timerInterval);}
function resetTimer(){clearInterval(timerInterval);timerSeconds=0;updateTimer();document.getElementById('timer-display').classList.remove('warning');}
function updateTimer(){
  const m=Math.floor(timerSeconds/60),s=timerSeconds%60;
  document.getElementById('timer-display').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  if(timerSeconds>180)document.getElementById('timer-display').classList.add('warning');
}

// ===== SPEECH RECOGNITION =====
function startSR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();
  recognition.lang=currentLang==='sc'?'zh-CN':'zh-TW';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.onresult=e=>{
    let fin='',int='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)fin+=e.results[i][0].transcript;
      else int+=e.results[i][0].transcript;
    }
    currentTranscript+=fin;
    document.getElementById('transcript-box').textContent=currentTranscript+int;
  };
  recognition.onerror=()=>{};
  recognition.onend=()=>{if(isRecording){try{recognition.start();}catch(e){}}};
  try{recognition.start();}catch(e){}
}
function stopSR(){
  if(recognition){recognition.onend=null;try{recognition.stop();}catch(e){}recognition=null;}
}

// ===== SUBMIT / SKIP =====
async function submitStory(){
  if(isRecording)await stopRecording();
  if(!recordings[currentStoryId]||!recordings[currentStoryId].blob){
    return; // nothing recorded
  }
  await uploadStory(currentStoryId);
  showFeedback(false);
}

async function skipStory(){
  if(!confirm(t('skipConfirm')))return;
  if(isRecording)await stopRecording();
  recordings[currentStoryId]={blob:null,transcript:'',skipped:true};
  await uploadStory(currentStoryId); // record the skip in DB too
  showFeedback(true);
}

// ===== UPLOAD =====
async function uploadStory(storyId){
  const r=recordings[storyId];
  if(!sb){r.uploaded=false;return;}
  showUpload(true);
  try{
    let audioPath=null;
    if(r.blob){
      const ext=r.mime&&r.mime.includes('mp4')?'m4a':'webm';
      audioPath=`${sessionId}/${storyId}.${ext}`;
      const{error:upErr}=await sb.storage.from('recordings').upload(audioPath,r.blob,{contentType:r.mime||'audio/webm',upsert:true});
      if(upErr)throw upErr;
    }
    const{error:dbErr}=await sb.from('submissions').insert({
      session_id:sessionId,
      student_id:studentData.id,
      class:studentData.cls,
      story_id:storyId,
      transcript:r.transcript||'',
      audio_path:audioPath,
      duration_sec:r.durationSec||0,
      lang:currentLang,
      skipped:!!r.skipped
    });
    if(dbErr)throw dbErr;
    r.uploaded=true;
  }catch(e){
    console.error('upload failed',e);
    r.uploaded=false;
  }
  showUpload(false);
}

function showUpload(on){
  document.getElementById('upload-msg').textContent=t('uploading');
  document.getElementById('upload-sub').textContent=t('uploadingSub');
  document.getElementById('upload-overlay').classList.toggle('on',on);
}

// ===== FEEDBACK =====
function showFeedback(skipped){
  showScreen('screen-feedback');
  document.getElementById('feedback-title').textContent=t('feedbackTitle');
  document.getElementById('fb-next-label').textContent=t('fbNextLabel');
  const msg=skipped?t('skipFeedback'):PRAISE[currentLang][Math.floor(Math.random()*PRAISE[currentLang].length)];
  document.getElementById('fb-content').textContent=msg;
}

// ===== NEXT =====
function nextStory(){
  currentStoryIndex++;
  if(currentStoryIndex>=storyQueue.length)showComplete();
  else goToRecord(storyQueue[currentStoryIndex]);
}

// ===== COMPLETE =====
function showComplete(){
  appStarted=false;
  showScreen('screen-complete');
  launchConfetti();
  document.getElementById('complete-title').textContent=t('completeTitle');
  document.getElementById('complete-sub').textContent=t('completeSub');
  document.getElementById('dl-label').textContent=t('dlLabel');

  const done=Object.values(recordings).filter(v=>!v.skipped&&v.blob).length;
  const skip=Object.values(recordings).filter(v=>v.skipped).length;
  const anyFail=Object.values(recordings).some(v=>v.blob&&!v.uploaded);

  let html=`<div class="summary-row"><span>📋</span><span>${t('summaryStudent')}：<strong>${studentData.id}</strong> ／ ${studentData.cls}</span></div>
  <div class="summary-row"><span>✅</span><span>${t('summaryDone')}：<strong>${done}</strong></span></div>`;
  if(skip>0)html+=`<div class="summary-row"><span>⏭️</span><span>${t('summarySkip')}：<strong>${skip}</strong></span></div>`;
  storyQueue.forEach(id=>{
    const r=recordings[id];
    if(r&&r.blob){
      const chip=r.uploaded?`<span class="upload-status-chip ok">☁️ ${t('chipOk')}</span>`:`<span class="upload-status-chip fail">⚠️ ${t('chipFail')}</span>`;
      html+=`<div class="summary-row"><span>🎙️</span><span>${STORIES[id].title[currentLang]} ${chip}</span></div>`;
    }
  });
  document.getElementById('complete-summary').innerHTML=html;

  // Show local backup button if any upload failed OR no supabase configured
  if(anyFail||!sb)document.getElementById('btn-dl-all').style.display='block';
}

function launchConfetti(){
  const c=document.getElementById('confetti');c.innerHTML='';
  const colors=['#FFD166','#FF8C42','#74C0FC','#95D5B2','#FFB3C6','#9B59B6','#7B3F00'];
  for(let i=0;i<45;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;width:${6+Math.random()*9}px;height:${6+Math.random()*9}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'3px'};`;
    c.appendChild(p);
  }
}

// ===== LOCAL BACKUP =====
function downloadAll(){
  let count=0;
  storyQueue.forEach(id=>{
    const r=recordings[id];
    if(r?.blob){
      setTimeout(()=>{
        const ext=r.mime&&r.mime.includes('mp4')?'m4a':'webm';
        const url=URL.createObjectURL(r.blob);
        const a=document.createElement('a');
        a.href=url;a.download=`MCASA_${studentData.cls}_${studentData.id}_${id}.${ext}`;a.click();
        URL.revokeObjectURL(url);
      },count*700);
      count++;
    }
  });
  let txt=`MCASA 逐字稿\n學生：${studentData.id}／${studentData.cls}\n日期：${new Date().toLocaleString()}\n\n`;
  storyQueue.forEach(id=>{
    const r=recordings[id];
    const title=STORIES[id].title['tc'];
    if(r?.skipped)txt+=`【${title}】跳過\n\n`;
    else if(r)txt+=`【${title}】（${r.durationSec||0}秒）\n${r.transcript||'（無逐字稿）'}\n\n`;
  });
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`MCASA_逐字稿_${studentData.cls}_${studentData.id}.txt`;
  setTimeout(()=>{a.click();URL.revokeObjectURL(url);},count*700);
}

window.onload=()=>showScreen('screen-lang');
</script>
